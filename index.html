            { q: "***물권의 종류 [cite: 80]", a: "소유권, 점유권, 용익물권(지상권, 지역권, 전세권), 담보물권(유치권, 질권, 저당권) 소유권은 그 소유물을 사용,수익,처분할 권리. [cite: 80] 점유권은 소유권과 관계없이 물건을 사실상 지배하고 있을 때 발생되는 권리, 지상권은 남의 토지를 사용할 수 있는 권리(건물 기타의 수목, 공작물), 지역권은 일정한 목적을 위해 타인의 토지를 자기 토지의 편익에 이용하는 권리, 전세권은 전세금을 지급하고 타인부동산을 용도에 따라 사용,수익할 권리, 유치권은 타인의 물건을 점유한 자가 그 물권에 관하여 생긴 채권을 변제받을때까지 점유만 하면 생기는 권리, 질권은 돈을 빌려주면서 물건을 질로 잡았을 때 같지 않을 경우 그 물건에서 우선변제받을 권리, 저당권은 채무의 담보로 제공한 부동산을 인도받지 않고 관념상으로만 지배하고, 채무의 변제가 없을 시 그 부동산을 처분하여 채권의 우선변제를 받을 권리 [cite: 81]", important: true },

            { q: "적용사례 [cite: 118]", a: "여러 명의로 보증금 별도작성-합산적용, 배당요구종기일까지 배당요구x-우선변제불가, 소액이였다 증액-행사불가, 감액-경매개시결정등기 전이면 인정 [cite: 118]", important: false },
            { q: "임대기간은 기본 2년으로 하고, 만료 전 6~2개월 사이 통지 없으면, 같은조건 재계약, 전속기간은 정하지 않은 것으로 보아 2년, 묵시적으로 했을 때 해지를 언제든 통지 가능하고, 3개월 지나면 [cite: 119]", a: "해지효력 발생 [cite: 119]", important: false }
        ];

        // 상태 변수
        let currentIndex = 0;
        let isAnswerShown = false;
        let filteredData = [...quizData];

        // DOM 요소
        const questionArea = document.getElementById('questionArea');
        const answerArea = document.getElementById('answerArea');
        const toggleBtn = document.getElementById('toggleBtn');
        const nextBtn = document.getElementById('nextBtn');
        const importantFilter = document.getElementById('importantFilter');
        const statusArea = document.getElementById('statusArea');

        // 화면 렌더링 함수
        function renderQuestion() {
            if (filteredData.length === 0) {
                questionArea.innerText = "조건에 맞는 문제가 없습니다.";
                answerArea.style.display = "none";
                toggleBtn.style.display = "none";
                nextBtn.style.display = "none";
                statusArea.innerText = "0 / 0";
                return;
            }

            // 인덱스 범위 초과 시 처음으로 돌아감
            if (currentIndex >= filteredData.length) {
                currentIndex = 0;
            }

            toggleBtn.style.display = "inline-block";
            nextBtn.style.display = "inline-block";

            const currentItem = filteredData[currentIndex];
            questionArea.innerText = currentItem.q;
            answerArea.innerText = currentItem.a;
            
            // 답변 숨김 상태로 초기화
            answerArea.style.display = "none";
            isAnswerShown = false;
            toggleBtn.innerText = "정답 확인";
            toggleBtn.classList.remove('btn-hide');
            
            // 현재 진행 상태 업데이트
            statusArea.innerText = `${currentIndex + 1} / ${filteredData.length}`;
        }

        // 정답 확인 / 숨기기 버튼 이벤트
        toggleBtn.addEventListener('click', () => {
            if (filteredData.length === 0) return;
            
            isAnswerShown = !isAnswerShown;
            
            if (isAnswerShown) {
                answerArea.style.display = "block";
                toggleBtn.innerText = "정답 숨기기";
                toggleBtn.style.backgroundColor = "#6c757d"; // 회색으로 변경
            } else {
                answerArea.style.display = "none";
                toggleBtn.innerText = "정답 확인";
                toggleBtn.style.backgroundColor = "#0275d8"; // 원래 파란색
            }
        });

        // 다음 문제 버튼 이벤트
        nextBtn.addEventListener('click', () => {
            if (filteredData.length === 0) return;
            currentIndex++;
            renderQuestion();
        });

        // 중요 문제 필터 토글 이벤트
        importantFilter.addEventListener('change', (e) => {
            if (e.target.checked) {
                // *** 또는 ** 표시가 포함되거나 important 속성이 true인 문제 필터링
                filteredData = quizData.filter(item => item.important || item.q.includes('**'));
            } else {
                filteredData = [...quizData];
            }
            currentIndex = 0; // 필터 변경 시 첫 문제로 초기화
            renderQuestion();
        });

        // 초기 화면 렌더링
        renderQuestion();
    </script>

</body>
